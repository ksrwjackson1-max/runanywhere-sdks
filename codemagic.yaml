workflows:
  android-agent:
    name: Android Agent Build
    max_build_duration: 60
    environment:
      vars:
        RUNANYWHERE_TEST_LOCAL: true
      jdk: openjdk17
      gradle: 8.13
      flutter: none
      xcode: none
    scripts:
      - name: Build Debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - kjackson96@live.co.uk