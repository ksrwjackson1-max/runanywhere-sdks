workflows:
  android-agent:
    name: Android Agent Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      # jdk removed — use the default CodeMagic JDK for Android builds
    scripts:
      - name: Build Debug APK
        script: ./gradlew :android-use-agent:app:assembleDebug