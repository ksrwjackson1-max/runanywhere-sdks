workflows:
  android-agent:
    name: Android Agent Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      android:
        version: 33         # Android SDK version
        build-tools: 33.0.2 # Optional, adjust as needed
    scripts:
      - name: Checkout code
        script: |
          git clone https://github.com/<your-username>/<your-repo>.git
          cd <your-repo>
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - build/app/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - <your-email@example.com>
      github:
        owner: <your-username>
        repository: <your-repo>
        release_name_template: "Build $CM_BUILD_ID"
        release_notes_template: "Automated build $CM_BUILD_ID"