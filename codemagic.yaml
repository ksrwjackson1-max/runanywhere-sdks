workflows:
  android-agent:
    name: Android Agent Build
    environment:
      vars:
        PACKAGE_NAME: "com.runanywhere.agent"

    scripts:
      - name: Build Debug APK
        script: |
          ./gradlew :examples:android:RunAnywhereAI:app:assembleDebug

      - name: Build Release APK
        script: |
          ./gradlew :examples:android:RunAnywhereAI:app:assembleRelease

    artifacts:
      - "examples/android/RunAnywhereAI/app/build/outputs/**/*.apk"