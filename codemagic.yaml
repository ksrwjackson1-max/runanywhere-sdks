workflows:
  android-agent:
    name: Build Android Agent
    environment:
      vars:
        ANDROID_HOME: /usr/local/android-sdk
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build Debug APK
        script: |
          ./gradlew :android-use-agent:app:assembleDebug
    artifacts:
      - android-use-agent/app/build/outputs/**/*.apk