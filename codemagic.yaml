workflows:
  android-agent:
    name: Android Agent Build
    environment:
      vars:
        PACKAGE_NAME: "com.runanywhere.agent"

    scripts:
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug

      - name: Build Release APK
        script: |
          ./gradlew assembleRelease

    artifacts:
      - runanywhere-kotlin/build/outputs/**/*.apk