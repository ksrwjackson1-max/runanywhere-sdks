workflows:
  android-agent:
    name: Android Agent Build
    max_build_duration: 60
    scripts:
      - name: Install Dependencies
        script: |
          ./gradlew clean
      - name: Build Debug APK
        script: |
          ./gradlew :android-use-agent:assembleDebug
    artifacts:
      - build/**/outputs/**/*.apk
    environment:
      vars:
        RUNANYWHERE_TEST: "true"