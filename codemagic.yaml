workflows:
  android-agent:
    name: RunAnywhere Android Build
    max_build_duration: 60
    environment:
      vars:
        RUNANYWHERE_TEST_LOCAL: true
    scripts:
      - name: Checkout repository
        script: git checkout $CM_BRANCH
      - name: Build Debug APK
        script: ./gradlew :Playground:android-use-agent:app:assembleDebug
      - name: Build Release APK
        script: ./gradlew :Playground:android-use-agent:app:assembleRelease
    artifacts:
      - build/outputs/**/*.apk
      - Playground/android-use-agent/app/build/outputs/**/*.apk