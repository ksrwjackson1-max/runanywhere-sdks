workflows:
  android-agent:
    name: Android Agent Build
    max_build_duration: 60
    environment:
      java: openjdk11
      android: true
    scripts:
      - name: Clean project
        script: ./gradlew clean
      - name: Build Debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - examples/android/RunAnywhereAI/app/build/outputs/apk/debug/app-debug.apk