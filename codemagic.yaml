workflows:
  android-agent:
    name: Android Agent Build
    max_build_duration: 60
    environment:
      vars:
        RUNANYWHERE_TEST_LOCAL: true
      flutter: none
      xcode: none
      android:
        gradle: 8.13
        jdk: openjdk17
    scripts:
      - name: Build Debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - you@example.com