workflows:
  android-agent:
    name: Android Agent Build
    environment:
      vars:
        PACKAGE_NAME: "com.runanywhere.agent"

    scripts:
      - name: Build Debug APK
        script: |
          ./gradlew :Playground:android-use-agent:app:assembleDebug

      - name: Build Release APK
        script: |
          ./gradlew :Playground:android-use-agent:app:assembleRelease

    artifacts:
      - "Playground/android-use-agent/app/build/outputs/**/*.apk"